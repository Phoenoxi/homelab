services:
  n8n:
    image: n8nio/n8n:${N8N_IMAGE_TAG:-1.93.0}
    container_name: n8n
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      - TZ=${TZ:-UTC}
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
